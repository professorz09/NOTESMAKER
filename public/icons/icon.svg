<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Open book left page -->
  <path d="M256 148 L110 196 L110 368 L256 334 Z" fill="white" fill-opacity="0.92"/>
  <!-- Open book right page -->
  <path d="M256 148 L402 196 L402 368 L256 334 Z" fill="white" fill-opacity="0.75"/>
  <!-- Book spine -->
  <rect x="250" y="148" width="12" height="186" rx="4" fill="#a5b4fc"/>
  <!-- Lines on left page -->
  <line x1="132" y1="232" x2="242" y2="215" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <line x1="132" y1="262" x2="242" y2="248" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <line x1="132" y1="292" x2="242" y2="280" stroke="#6366f1" stroke-width="8" stroke-linecap="round"/>
  <!-- Lines on right page -->
  <line x1="270" y1="215" x2="380" y2="232" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <line x1="270" y1="248" x2="380" y2="262" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <line x1="270" y1="280" x2="380" y2="292" stroke="#7c3aed" stroke-width="8" stroke-linecap="round"/>
  <!-- Pencil icon bottom-right -->
  <g transform="translate(330, 330) rotate(-35)">
    <rect x="-10" y="-52" width="20" height="64" rx="3" fill="#fcd34d"/>
    <polygon points="-10,12 10,12 0,34" fill="#f59e0b"/>
    <rect x="-10" y="-60" width="20" height="12" rx="2" fill="#d1d5db"/>
    <line x1="-10" y1="-38" x2="10" y2="-38" stroke="#e5e7eb" stroke-width="2"/>
  </g>
</svg>
