<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable icon (no rounded corners) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content within safe zone (80% = 204px margin on each side, so 204..308) -->
  <!-- Scaled to fit safely inside 80% safe zone -->
  <!-- Open book left page -->
  <path d="M256 155 L125 198 L125 355 L256 325 Z" fill="white" fill-opacity="0.92"/>
  <!-- Open book right page -->
  <path d="M256 155 L387 198 L387 355 L256 325 Z" fill="white" fill-opacity="0.75"/>
  <!-- Book spine -->
  <rect x="250" y="155" width="12" height="170" rx="4" fill="#a5b4fc"/>
  <!-- Lines on left page -->
  <line x1="145" y1="228" x2="242" y2="213" stroke="#6366f1" stroke-width="7" stroke-linecap="round"/>
  <line x1="145" y1="255" x2="242" y2="243" stroke="#6366f1" stroke-width="7" stroke-linecap="round"/>
  <line x1="145" y1="282" x2="242" y2="272" stroke="#6366f1" stroke-width="7" stroke-linecap="round"/>
  <!-- Lines on right page -->
  <line x1="270" y1="213" x2="367" y2="228" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  <line x1="270" y1="243" x2="367" y2="255" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
  <line x1="270" y1="272" x2="367" y2="282" stroke="#7c3aed" stroke-width="7" stroke-linecap="round"/>
</svg>
